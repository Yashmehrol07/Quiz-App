<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbdulYash AI Learning Hub</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="landing.css">
</head>

<body>
    <!-- Animated background blobs -->
    <div class="background-anim">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-brain"></i> AbdulYash<span>AI</span>
        </div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="quiz.html" class="nav-btn">Start Quiz</a></li>
        </ul>
    </nav>

    <main id="home" class="hero">
        <div class="glass-container">
            <h1 class="hero-title">Welcome to the Future of Learning</h1>
            <p class="hero-subtitle">Master any subject with our real-time smart quiz arena and resolve your deepest
                doubts instantly with the AbdulYash AI Mentor. A Final Year Masterpiece.</p>
            <div class="cta-group">
                <a href="quiz.html" class="btn btn-primary">
                    <i class="fa-solid fa-gamepad"></i> Enter Quiz Arena
                </a>
                <a href="abdul&yash/index.html" class="btn btn-secondary">
                    <i class="fa-solid fa-robot"></i> Ask AI Mentor
                </a>
            </div>
            <p id="ai-status-msg"
                style="margin-top: 20px; font-size: 0.8rem; color: #a2aac2; cursor: pointer; text-decoration: underline;"
                onclick="runAIDiagnostic()">💡 AI Connection Status: Check Now</p>
        </div>
    </main>

    <script src="javascript/config.js"></script>
    <script>
        async function runAIDiagnostic() {
            const msg = document.getElementById("ai-status-msg");
            msg.innerHTML = "⏳ Testing AI Endpoints... please wait.";
            msg.style.color = "#1d7efd";

            const API_KEY = typeof CONFIG !== 'undefined' ? CONFIG.GEMINI_API_KEY : "";
            const endpoints = typeof CONFIG !== 'undefined' ? CONFIG.ENDPOINTS : [];

            if (!API_KEY || API_KEY.includes("PASTE")) {
                msg.innerHTML = "❌ Error: API Key missing in config.js";
                msg.style.color = "#F23723";
                return;
            }

            let results = [];
            for (let url of endpoints) {
                try {
                    const res = await fetch(`${url}?key=${API_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: "hi" }] }] })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        results.push(`✅ ${url.split('models/')[1].split(':')[0]} is Working!`);
                    } else {
                        results.push(`❌ ${url.split('models/')[1].split(':')[0]} Failed: ${data.error?.message || "Unknown error"}`);
                    }
                } catch (e) {
                    results.push(`⚠️ ${url.split('models/')[1].split(':')[0]} Connection Error`);
                }
            }
            alert("AI Diagnostic Report:\n\n" + results.join("\n"));
            msg.innerHTML = "💡 AI Connection Status: Check Now";
            msg.style.color = "#a2aac2";
        }
    </script>
</body>

</html>
